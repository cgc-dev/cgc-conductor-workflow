name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-chronos-prod
  ACR_NAME: chronosacr
  CONTAINER_APPS_ENVIRONMENT: chronos-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get ACR Login Server
      id: acr
      run: |
        ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer --output tsv)
        echo "login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
    
    - name: Login to Azure Container Registry
      run: az acr login --name ${{ env.ACR_NAME }}
    
    - name: Build and Push API Image
      run: |
        docker build -t ${{ steps.acr.outputs.login_server }}/chronos-api:${{ github.sha }} \
          -t ${{ steps.acr.outputs.login_server }}/chronos-api:latest \
          -f devops/docker/Dockerfile.prod --target api .
        docker push ${{ steps.acr.outputs.login_server }}/chronos-api:${{ github.sha }}
        docker push ${{ steps.acr.outputs.login_server }}/chronos-api:latest
    
    - name: Build and Push Client Image
      run: |
        docker build -t ${{ steps.acr.outputs.login_server }}/chronos-client:${{ github.sha }} \
          -t ${{ steps.acr.outputs.login_server }}/chronos-client:latest \
          -f devops/docker/Dockerfile.prod --target client .
        docker push ${{ steps.acr.outputs.login_server }}/chronos-client:${{ github.sha }}
        docker push ${{ steps.acr.outputs.login_server }}/chronos-client:latest
    
    - name: Build and Push Keycloak Image
      run: |
        docker build -t ${{ steps.acr.outputs.login_server }}/chronos-keycloak:${{ github.sha }} \
          -t ${{ steps.acr.outputs.login_server }}/chronos-keycloak:latest \
          -f devops/docker/Dockerfile.keycloak .
        docker push ${{ steps.acr.outputs.login_server }}/chronos-keycloak:${{ github.sha }}
        docker push ${{ steps.acr.outputs.login_server }}/chronos-keycloak:latest
    
    - name: Deploy API to Container Apps
      run: |
        az containerapp update \
          --name chronos-api \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --image ${{ steps.acr.outputs.login_server }}/chronos-api:${{ github.sha }}
    
    - name: Deploy Client to Container Apps
      run: |
        az containerapp update \
          --name chronos-client \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --image ${{ steps.acr.outputs.login_server }}/chronos-client:${{ github.sha }}
    
    - name: Deploy Keycloak to Container Apps
      run: |
        az containerapp update \
          --name chronos-keycloak \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --image ${{ steps.acr.outputs.login_server }}/chronos-keycloak:${{ github.sha }}
    
    - name: Get Application URLs
      run: |
        echo "## Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Application URLs:" >> $GITHUB_STEP_SUMMARY
        
        CLIENT_URL=$(az containerapp show --name chronos-client --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn --output tsv)
        API_URL=$(az containerapp show --name chronos-api --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn --output tsv)
        KEYCLOAK_URL=$(az containerapp show --name chronos-keycloak --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn --output tsv)
        
        echo "- **Client:** https://$CLIENT_URL" >> $GITHUB_STEP_SUMMARY
        echo "- **API:** https://$API_URL" >> $GITHUB_STEP_SUMMARY
        echo "- **Keycloak:** https://$KEYCLOAK_URL" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
